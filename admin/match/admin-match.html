<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - 경기 기록 관리</title>

    <link rel="stylesheet" href="../admin-style.css">
    <link rel="stylesheet" href="admin-match-style.css">
</head>

<body>

    <div class="admin-container">
        <header class="admin-header">
            <h2>⚾ 경기 기록 입력</h2>
            <a href="../menu.html" class="back-link">메뉴로 돌아가기</a>
        </header>

        <section class="selection-section">
            <label for="match-select">기록할 경기 선택</label>
            <select id="match-select" class="input-field match-select">
                <option value="">경기를 선택해주세요</option>
            </select>
        </section>

        <div id="record-form" class="form-container" style="display: none;">

            <div class="info-card">
                <h3 id="info-title">대회 이름 로딩중...</h3>
                <p id="info-meta">날짜 | 장소</p>
            </div>

            <hr class="divider">

            <h3 class="section-title">경기 결과 설정</h3>
            <div class="form-group">
                <select id="match-result-status" class="input-field">
                    <option value="before">경기 예정</option>
                    <option value="win">승리 (WIN)</option>
                    <option value="loss">패배 (LOSS)</option>
                    <option value="draw">무승부 (DRAW)</option>
                    <option value="no_record">기록 없음 (종료됨)</option>
                    <option value="rain_cancel">우천 취소</option>
                    <option value="etc_cancel">기타 취소</option>
                    <option value="rain_suspend">우천 서스펜디드</option>
                </select>
            </div>

            <div id="win-stats-box" class="form-grid" style="display: none; margin-top: 15px;">
                <div class="form-group">
                    <label>승리 투수</label>
                    <div class="autocomplete-wrapper">
                        <input type="text" id="win-pitcher" class="input-field" placeholder="선수 검색 또는 입력">
                    </div>
                </div>
                <div class="form-group">
                    <label>결승타/MVP</label>
                    <input type="text" id="mvp-player" class="input-field" placeholder="예: 나예준 (3회 좌전 안타)">
                </div>
            </div>

            <div id="detail-check-wrapper" style="display: flex; gap: 20px; margin-bottom: 15px;">
                <label>
                    <input type="checkbox" id="check-detail-scoreboard"> 상세 스코어보드 입력 (이닝별 점수, H/E/B, 승리투수 등)
                </label>
                <label>
                    <input type="checkbox" id="check-detail-lineup"> 라인업 입력 (스타팅, 투수, 교체)
                </label>
            </div>

            <div id="section-scoreboard">
                <h3 class="section-title">스코어보드</h3>
                <div class="table-scroll">
                    <table class="scoreboard-input-table">
                        <thead>
                            <tr>
                                <th>TEAM</th>
                                <th class="detail-column">1</th>
                                <th class="detail-column">2</th>
                                <th class="detail-column">3</th>
                                <th class="detail-column">4</th>
                                <th class="detail-column">5</th>
                                <th class="detail-column">6</th>
                                <th class="detail-column">7</th>
                                <th class="detail-column">8</th>
                                <th class="detail-column">9</th>
                                <th class="detail-column">10</th>
                                <th class="detail-column">11</th>
                                <th class="detail-column">12</th>
                                <th class="stat-head">R (최종)</th>
                                <th class="stat-head detail-column">H</th>
                                <th class="stat-head detail-column">E</th>
                                <th class="stat-head detail-column">B</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr id="row-away">
                                <td class="team-name-cell"><span id="name-away" class="team-name-label">AWAY</span></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="1" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="2" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="3" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="4" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="5" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="6" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="7" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="8" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="9" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="10" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="11" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="12" value="0"></td>
                                <td><input type="number" class="stat-in r-val"
                                        style="width:60px; font-weight:bold; background:#fff7ed;"></td>
                                <td class="detail-column"><input type="number" id="h-away" class="stat-in detail-score"
                                        value="0"></td>
                                <td class="detail-column"><input type="number" id="e-away" class="stat-in detail-score"
                                        value="0"></td>
                                <td class="detail-column"><input type="number" id="b-away" class="stat-in detail-score"
                                        value="0"></td>
                            </tr>
                            <tr id="row-home">
                                <td class="team-name-cell"><span id="name-home" class="team-name-label">HOME</span></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="1" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="2" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="3" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="4" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="5" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="6" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="7" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="8" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="9" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="10" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="11" value="0"></td>
                                <td class="detail-column"><input type="number" class="score-in detail-score"
                                        data-idx="12" value="0"></td>
                                <td><input type="number" class="stat-in r-val"
                                        style="width:60px; font-weight:bold; background:#fff7ed;"></td>
                                <td class="detail-column"><input type="number" id="h-home" class="stat-in detail-score"
                                        value="0"></td>
                                <td class="detail-column"><input type="number" id="e-home" class="stat-in detail-score"
                                        value="0"></td>
                                <td class="detail-column"><input type="number" id="b-home" class="stat-in detail-score"
                                        value="0"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="section-lineup" style="display: none;">
                <hr class="divider">
                <div class="lineup-section-wrapper">
                    <div class="lineup-box" style="overflow-x: auto;">
                        <h3 class="lineup-title">타자 라인업 (이닝별 타석 결과)</h3>
                        <table id="table-starting" class="lineup-table" style="min-width: 1300px;">
                            <thead>
                                <tr>
                                    <th width="60px">타순</th>
                                    <th width="200px">선수명(배번)</th>
                                    <th width="80px">포지션</th>
                                    <th width="60px">투타</th>
                                    <script>for (let i = 1; i <= 12; i++) document.write(`<th width="70px">${i}회</th>`);</script>
                                    <th width="50px">삭제</th>
                                </tr>
                            </thead>
                            <tbody>
                                <script>
                                    for (let i = 1; i <= 9; i++) {
                                        let inningInputs = "";
                                        for (let j = 1; j <= 12; j++) inningInputs += `<td><input type="text" class="input-field inn-res-input"></td>`;
                                        document.write(`
                    <tr>
                        <td><input type="text" class="input-field order-input" value="${i}" style="text-align:center;"></td> <td><input type="text" class="input-field player-input" placeholder="선수 검색"></td>
                        <td>
                            <select class="input-field pos-select">
                                <option value="">선택</option>
                                <option value="P">P</option><option value="C">C</option>
                                <option value="1B">1B</option><option value="2B">2B</option>
                                <option value="3B">3B</option><option value="SS">SS</option>
                                <option value="LF">LF</option><option value="CF">CF</option>
                                <option value="RF">RF</option><option value="DH">DH</option>
                            </select>
                        </td>
                        <td><input type="text" class="input-field type-input" readonly></td>
                        ${inningInputs}
                        <td><button type="button" class="btn-remove-row" onclick="this.closest('tr').remove()">✕</button></td>
                    </tr>
                    `);
                                    }
                                </script>
                            </tbody>
                        </table>
                        <button type="button" id="btn-add-batter" class="btn btn-register"
                            style="margin-top: 10px; width: 100%;">+ 교체 타자 라인업 추가</button>
                    </div>

                    <div class="lineup-box" style="overflow-x: auto;">
                        <h3 class="lineup-title">투수 기록 입력</h3>
                        <table id="table-pitcher" class="lineup-table" style="min-width: 900px;">
                            <thead>
                                <tr>
                                    <th width="80px">순서</th>
                                    <th width="200px">선수명(배번)</th>
                                    <th width="80px">이닝</th>
                                    <th width="60px">피안타</th>
                                    <th width="60px">4사구</th>
                                    <th width="60px">삼진</th>
                                    <th width="60px">실점</th>
                                    <th width="60px">자책</th>
                                    <th>비고</th>
                                    <th width="50px">삭제</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                        <button type="button" id="btn-add-pitcher" class="btn btn-register"
                            style="margin-top: 10px; width: 100%;">+ 투수 추가</button>
                    </div>
                </div>
            </div>

            <hr class="divider">

            <h3 class="section-title">경기 사진 업로드</h3>
            <div class="form-group">
                <div class="file-upload-box">
                    <input type="file" id="match-photos" multiple accept=".jpg, .jpeg">
                    <p class="file-help">여러 장 선택 가능 (200KB 이하, JPG)</p>
                </div>
                <div id="photo-preview-box" class="photo-preview-container" style="display:none;"></div>
                <p class="warning-text">⚠️ 사진 수정 후 반드시 <strong>[저장]</strong> 버튼을 눌러야 반영됩니다.</p>
            </div>

            <div class="action-buttons">
                <button class="btn btn-register" id="btn-save-record">경기 기록 저장</button>
                <button class="btn btn-cancel" onclick="location.reload()">취소</button>
            </div>

        </div>
    </div>

    <script type="module" src="admin-match.js"></script>
</body>

</html>
